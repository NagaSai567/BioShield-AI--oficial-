<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioShield AI - Enterprise</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Background -->
    <div id="bg-pan"></div>
    <div class="video-overlay"></div>

    <!-- Google Translate Element with Icon -->
    <div class="translate-container">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="translate-icon"><path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"></path></svg>
        <div id="google_translate_element" class="translate-widget"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="glass-sidebar">
            <div class="logo">BioShield<span>AI</span></div>
            <ul class="nav-links">
                <li class="active" data-tab="pesticides">
                    <!-- Spray Icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4"></path><path d="M4 14v5a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"></path><path d="M4 10h16v4H4z"></path><path d="M12 14v4"></path><path d="M10 2h4"></path></svg>
                    Pesticide Awareness
                </li>
                <li data-tab="fertilizers">
                    <!-- Droplet Icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                    Fertilizers and Manures
                </li>
                <li data-tab="schemes">
                    <!-- Courthouse Icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"></path><path d="M12 3l-9 6v2h18V9l-9-6z"></path><path d="M6 11v6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M18 11v6"></path></svg>
                    Gov Schemes
                </li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Pesticides Tab -->
            <section id="pesticides" class="tab-content active">
                <header class="section-header">
                    <h1>Pesticide Awareness</h1>
                    <div class="search-container">
                        <input type="text" id="search-pesticides" placeholder="Search by crop name (e.g. Rice, Sugarcane)..." class="glass-input">
                    </div>
                </header>
                <div class="grid-container" id="pesticides-grid"></div>
            </section>

            <!-- Fertilizers Tab -->
            <section id="fertilizers" class="tab-content">
                <header class="section-header">
                    <h1>Fertilizers and Manures</h1>
                    <div class="search-container">
                        <input type="text" id="search-fertilizers" placeholder="Search by crop name (e.g. Tomato, Cotton)..." class="glass-input">
                    </div>
                </header>
                <div class="grid-container" id="fertilizers-grid"></div>
            </section>

            <!-- Gov Schemes Tab -->
            <section id="schemes" class="tab-content">
                <header class="section-header">
                    <h1>Government Schemes</h1>
                    <p>Latest agricultural welfare programs.</p>
                    <small id="schemes-updated" class="last-updated"></small>
                </header>
                <div class="grid-container" id="schemes-grid"></div>
            </section>
        </main>
    </div>

    <!-- Google Translate Script (Restricted Languages) -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,hi,bn,te,mr,ta,ur,gu,kn,ml,pa',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <script src="script.js"></script>
</body>
</html>
